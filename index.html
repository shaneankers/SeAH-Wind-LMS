function alive(){return state.players.filter(p=>p.paid&&p.approved&&p.alive)}
function out(){return state.players.filter(p=>p.paid&&p.approved&&!p.alive).sort((a,b)=>(b.outRound||0)-(a.outRound||0))}
function pot(){return (state.potCarryover||0)+(paid().length*state.entryFee)}
function currentPlayer(){return state.players.find(p=>p.name===state.selectedPlayer)||state.players[0]||{name:"",approved:false,paid:false,alive:true,wins:0,pick:"",locked:false,previous:[]}}
function defendingChampion(){return state.champions.length?state.champions[state.champions.length-1].name:"None"}
function stars(n){return n?"⭐".repeat(n):""}
function displayName(p){return `${defendingChampion()===p.name?"🏆 ":""}${p.name} ${stars(p.wins)}`.trim()}
function ensureLeagues(){
 if(!state.leagues){
  state.leagues={"Premier League":[...state.teams],"Championship":[],"League One":[],"League Two":[]};
 }
 state.teams=Object.values(state.leagues).flat();
}
function leagueKeys(){ensureLeagues();return Object.keys(state.leagues);}
function teamLeague(team){
 ensureLeagues();
 return leagueKeys().find(l=>state.leagues[l].includes(team))||leagueKeys()[0];
}
function noteTextRaw(key){
 if(!state.notifications){state.notifications={unpaid:"Payment reminder: your SeAH Wind LMS entry is still marked as unpaid. Please pay £{entryFee} to confirm your place.",missingPick:"Pick reminder: you have not selected your team for SeAH Wind LMS Round {round}. Please submit your pick before {deadline}.",winner:"Winner announcement: {winner} has won SeAH Wind LMS Competition #{competition}.",rollover:"Rollover announcement: SeAH Wind LMS Competition #{competition} has rolled over. Everyone is back in, previous teams remain unavailable, and payment is due again."};}
 return state.notifications[key]||"";
}
function noteText(key, extra={}){
 if(!state.notifications){
  state.notifications={unpaid:"Payment reminder: your SeAH Wind LMS entry is still marked as unpaid. Please pay £{entryFee} to confirm your place.",missingPick:"Pick reminder: you have not selected your team for SeAH Wind LMS Round {round}. Please submit your pick before {deadline}.",winner:"Winner announcement: {winner} has won SeAH Wind LMS Competition #{competition}.",rollover:"Rollover announcement: SeAH Wind LMS Competition #{competition} has rolled over. Everyone is back in, previous teams remain unavailable, and payment is due again."};
 }
 const data={entryFee:state.entryFee,round:state.round,deadline:state.deadline,competition:state.competition,winner:extra.winner||defendingChampion()};
 return (state.notifications[key]||"").replace(/\{(\w+)\}/g,(m,k)=>data[k]??m);
}

}

function logout(){authUser=null;localStorage.removeItem("seah_auth_user_current");page="dashboard";renderAuth()}
function ensureAdminPlayer(){
 let p=state.players.find(x=>x.adminPlayer===true);
 if(!p){
  p=state.players.find(x=>x.name===authUser.name);
  if(p) p.adminPlayer=true;
 }
 if(!p){
  state.players.unshift({name:authUser.name,pin:"admin",approved:true,paid:true,alive:true,wins:0,pick:"",locked:false,result:"pending",previous:[],outRound:null,outPick:null,notifications:true,adminPlayer:true});
  p=state.players[0];
 }
 p.approved=true;
 if(typeof p.paid==="undefined") p.paid=true;
 if(typeof p.notifications==="undefined") p.notifications=true;
 return p;
}
function switchAdminView(view){
 adminView=view;
 localStorage.setItem("seah_admin_view_current",view);
 role=view;
 if(view==="player"){
  const adminPlayer=ensureAdminPlayer();
  state.selectedPlayer=adminPlayer.name;
 }
 page=view==="admin"?"dashboard":"myPick";
 render();
}
function navItems(){return role==="admin"?[["dashboard","🏠 Dashboard"],["players","👥 Players"],["round","⚽ Round"],["settings","⚙️ Settings"]]:[["myPick","🏠 Dashboard"],["previous","📋 Previous Picks"],["competition","🏆 Competition"],["playerHall","🏅 Hall of Fame"],["rules","📖 Rules"],["playerSettings","⚙️ Settings"]]}
function render(){
 ensureLeagues();
 if(!state.adminAlerts)state.adminAlerts=[];
 state.players.forEach(p=>{
  if(p.locked && !p.pick) p.locked=false;
  if(typeof p.notifications==="undefined") p.notifications=true;
 });
 if(!renderAuth())return;const items=navItems();const modeSwitch=authUser.role==="admin"?`<div class="mode-switch"><button class="${role==='admin'?'active':''}" onclick="switchAdminView('admin')">Admin</button><button class="${role==='player'?'active':''}" onclick="switchAdminView('player')">Player</button></div>`:"";document.getElementById("nav").innerHTML=modeSwitch+items.map(([id,label])=>`<button class="${page===id?'active':''}" onclick="setPage('${id}')">${label}</button>`).join("")+`<button class="logout-btn" onclick="logout()">Logout</button>`;document.getElementById("pageTitle").textContent=(items.find(x=>x[0]===page)?.[1]||"Dashboard").replace(/[🏠👥⚽🏆⚙️📋📖🏅]/g,"").trim();document.getElementById("pageSub").textContent="";document.getElementById("sideTitle").textContent=role==="admin"?"Administrator":currentPlayer().name;document.getElementById("sideSub").textContent="";document.querySelector(".sidebar").classList.toggle("player-mode",role==="player");document.querySelector(".sidebar").classList.toggle("admin-mode",role==="admin");const views={dashboard,players,round,settings,myPick,previous,competition,playerHall,rules,playerSettings};document.getElementById("content").innerHTML=(views[page]||dashboard)()}

function addTeam(league){
 ensureLeagues();
 const input=document.getElementById("add-"+league.replace(/\s/g,'-'));
 const name=(input?.value||"").trim();
 if(!name)return toast("Enter a team name.");
 if(state.teams.some(t=>t.toLowerCase()===name.toLowerCase()))return toast("Team already exists.");
 state.leagues[league].push(name);
 state.teams=Object.values(state.leagues).flat();
 input.value="";
 toast(name+" added.");
 save();
}
function removeTeam(league,team){
 ensureLeagues();
 if(!confirm("Remove "+team+"?"))return;
 state.leagues[league]=state.leagues[league].filter(t=>t!==team);
 state.teams=Object.values(state.leagues).flat();
 toast(team+" removed.");
 save();
}

 if(!p)return toast("Player not found.");

async function resetPlayerPassword(i){
 const p=state.players[i];
 if(!p)return toast("Player not found.");
 const username=p.username||p.name;
 const newPass=prompt("Enter temporary password for "+p.name+":");
 if(newPass===null)return;
 if(newPass.trim().length<4)return toast("Password must be at least 4 characters.");
 try{
  const {error}=await supabaseClient.rpc("admin_reset_password_by_username",{
   p_username:username,
   p_new_password:newPass.trim()
  });
  if(error)throw error;
  toast("Password reset for "+p.name+".");

 }

function confirmPlayerPick(){

  p.locked=false;

 }
 if(!confirm(`Confirm ${pick} as your pick? Once submitted, you cannot change it unless the admin unlocks it.`))return;
 p.pick=pick;
 p.locked=true;

}
function processRound(){
 const pending=alive().filter(p=>p.result==="pending");
 if(pending.length){
  toast("Mark result for: "+pending.map(p=>p.name).join(", "));
  return;
 }

 const teamResults={};
 const conflicts=[];

 alive().forEach(p=>{
  if(!p.pick)return;
  if(!teamResults[p.pick]){
   teamResults[p.pick]=p.result;
  }else if(teamResults[p.pick]!==p.result){
   conflicts.push(p.pick);
  }
 });

 if(conflicts.length){
  toast("Result mismatch for: "+[...new Set(conflicts)].join(", "));
  return;
 }

 const before=alive().length;

 alive().forEach(p=>{
  if(p.pick&&!p.previous.includes(p.pick))p.previous.push(p.pick);

  if(!p.pick||p.result==="lose"){
   p.alive=false;
   p.outRound=state.round;
   p.outPick=p.pick||"No Pick";
  }

  p.pick="";
  p.locked=false;
  p.result="pending";
 });

 const s=alive();

 if(s.length===1){
  s[0].wins++;
  state.champions.push({name:s[0].name,comp:state.competition,rollover:state.rollover||0});
  addAdminAlert("Winner found","Winner: "+s[0].name+". Admin action needed: send winner notification, sort prize money, then start the next competition when ready.");
  alert("Winner found: "+s[0].name+"\n\nAdmin action needed: sort prize money, then start the next competition when ready.");
  toast("Winner: "+s[0].name);
  page="playerHall";
 }else if(s.length===0&&before>0){
  state.potCarryover=(state.potCarryover||0)+(paid().length*state.entryFee);
  state.rollover=(state.rollover||0)+1;
  state.round++;
  state.players.filter(p=>p.approved).forEach(p=>{
   p.alive=true;
   p.paid=false;
   p.outRound=null;
   p.outPick=null;
   p.pick="";
   p.locked=false;
   p.result="pending";
  });
  addAdminAlert("Rollover started","Rollover "+state.rollover+" has started. Admin action needed: send rollover notification and collect payment again from everyone who is back in.");
  alert("Rollover started.\n\nAdmin action needed: collect payment again from everyone who is back in.");
  toast("Rollover "+state.rollover+" started. Everyone is back in and payment is due again.");
 }else{
  state.round++;
  toast("Round processed.");
 }

 save();
}
function nextRoundOnly(){state.round++;save()}
function startNextCompetition(){state.competition++;state.rollover=0;state.potCarryover=0;state.round=1;state.players.filter(p=>p.approved&&p.paid).forEach(p=>{p.alive=true;p.pick="";p.locked=false;p.result="pending";p.previous=[];p.outRound=null;p.outPick=null});page="dashboard";toast("Competition #"+state.competition+" started.");save()}

function saveAdminAccount(){state.adminUsername=document.getElementById("adminUsername").value.trim();state.adminPassword=document.getElementById("adminPassword").value.trim();authUser.name=state.adminUsername;localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));save()}
async function savePlayerAccount(){
 const p=currentPlayer();
 const oldName=p.name;
 const newName=document.getElementById("playerUsername").value.trim();
 const pinEl=document.getElementById("playerPin");
 const isAdminPlayer=authUser&&authUser.role==="admin"&&(p.adminPlayer||p.id===authUser.user_id);
 const newPin=pinEl?pinEl.value.trim():"";
 if(!newName)return toast("Display name is required.");
 if(!isAdminPlayer&&!newPin)return toast("Password is required.");
 if(state.players.some(x=>x!==p&&x.name.toLowerCase()===newName.toLowerCase()))return toast("That display name already exists.");
 try{
  if(!isAdminPlayer&&newPin){
   const {error}=await supabaseClient.rpc("app_change_password",{p_user_id:p.id,p_new_password:newPin});
   if(error)throw error;
  }
  p.name=newName;
  if(!isAdminPlayer)p.pin="";
  state.selectedPlayer=newName;
  if(authUser&&authUser.role==="player"&&authUser.name===oldName){
   authUser.name=newName;
   localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  }
  if(authUser&&authUser.role==="admin"&&authUser.name===oldName){
   authUser.name=newName;
   localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  }
  toast(isAdminPlayer?"Display name updated. Admin password unchanged.":"Account updated.");
  save();
 }catch(e){
  console.error(e);
  toast("Could not update account: "+(e.message||"unknown error"));
 }
}

async function completeForcedPasswordReset(){
 const p1=document.getElementById("forcedNewPassword").value.trim();
 const p2=document.getElementById("forcedConfirmPassword").value.trim();
 if(!p1)return toast("Enter a new password.");
 if(p1.length<4)return toast("Password must be at least 4 characters.");
 if(p1!==p2)return toast("Passwords do not match.");
 try{
  const {error}=await supabaseClient.rpc("app_change_password",{
   p_user_id:authUser.user_id,
   p_new_password:p1
  });
  if(error)throw error;
  authUser.must_reset_password=false;
  localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  toast("Password updated.");
  await dbLoad();
  page=authUser.role==="admin"?"dashboard":"myPick";
  render();
 }catch(e){
  console.error(e);
  toast("Could not update password: "+(e.message||"unknown error"));
 }
}

async function dbLoad(){
 try{
  const [settingsRes, compsRes, usersRes, stateRes, historyRes, teamsRes, champsRes]=await Promise.all([
   supabaseClient.from("app_settings").select("*").eq("id",1).maybeSingle(),
   supabaseClient.from("competitions").select("*").eq("status","active").order("created_at",{ascending:false}).limit(1).maybeSingle(),
   supabaseClient.from("app_users").select("*").order("created_at",{ascending:true}),
   supabaseClient.from("player_state").select("*"),
   supabaseClient.from("pick_history").select("*"),
   supabaseClient.from("teams").select("*").order("league").order("team_name"),
   supabaseClient.from("champions").select("*, app_users(display_name)").order("won_at",{ascending:true})
  ]);

  const results=[settingsRes, compsRes, usersRes, stateRes, historyRes, teamsRes, champsRes];
  const firstError=results.find(r=>r.error);
  if(firstError)throw firstError.error;

  const s=settingsRes.data;
  if(s){
   state.joinCode=s.join_code||state.joinCode;
   state.entryFee=Number(s.entry_fee||state.entryFee);
   state.deadline=s.deadline||state.deadline;
   state.rules=s.rules||state.rules;
  }

  const c=compsRes.data;
  if(c){
   state.activeCompetitionId=c.id;
   state.competition=c.competition_number||1;
   state.rollover=c.rollover_number||0;
   state.round=c.round_number||1;
   state.potCarryover=Number(c.pot_carryover||0);
  }

  const stateByUser={};
  (stateRes.data||[]).forEach(p=>stateByUser[p.user_id]=p);

  const histByUser={};
  (historyRes.data||[]).forEach(h=>{
   if(!histByUser[h.user_id])histByUser[h.user_id]=[];
   histByUser[h.user_id].push(h.team);
  });

  if(authUser&&authUser.user_id){
   const me=(usersRes.data||[]).find(u=>u.id===authUser.user_id);
   if(me){
    authUser.name=me.display_name||me.username;
    authUser.must_reset_password=!!me.must_reset_password;
    localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
   }
  }

  state.players=(usersRes.data||[]).map(u=>{
   const ps=stateByUser[u.id]||{};
   return {
    id:u.id,
    username:u.username,
    name:u.display_name||u.username,
    pin:"",
    approved:!!u.approved,
    paid:!!ps.paid,
    alive:ps.alive!==false,
    wins:ps.wins||0,
    pick:ps.current_pick||"",
    locked:!!ps.pick_locked,
    result:ps.result||"pending",
    previous:histByUser[u.id]||[],
    outRound:ps.out_round,
    outPick:ps.out_pick,
    notifications:u.notifications_enabled!==false,
    adminPlayer:u.role==="admin"
   };
  });

  const leagues={"Premier League":[],"Championship":[],"League One":[],"League Two":[]};
  (teamsRes.data||[]).forEach(t=>{
   if(!leagues[t.league])leagues[t.league]=[];
   leagues[t.league].push(t.team_name);
  });
  state.leagues=leagues;
  state.teams=Object.values(leagues).flat();

  state.champions=(champsRes.data||[]).map(c=>({
   name:c.app_users?.display_name||"Winner",
   comp:c.competition_number,
   rollover:c.rollover_number
  }));

  onlineReady=true;
  localStorage.setItem(storeKey,JSON.stringify(state));
  setOnlineStatus("Connected to database",true);
  render();
 }catch(e){
  console.error(e);
  onlineReady=false;
  setOnlineStatus("Database connection failed",false);
  toast("Database connection failed. Check Supabase setup.");
 }
}

async function dbSaveSettings(){
 if(!onlineReady)return;
 await supabaseClient.from("app_settings").update({
  join_code:state.joinCode,
  entry_fee:state.entryFee,
  deadline:state.deadline,
  rules:state.rules
 }).eq("id",1);

 if(state.activeCompetitionId){
  await supabaseClient.from("competitions").update({
   competition_number:state.competition,
   rollover_number:state.rollover||0,
   round_number:state.round,
   pot_carryover:state.potCarryover||0
  }).eq("id",state.activeCompetitionId);
 }
}

async function dbUpsertPlayer(p){
 if(!onlineReady||!p.id)return;
 await supabaseClient.from("app_users").update({
  display_name:p.name,
  approved:!!p.approved,
  notifications_enabled:p.notifications!==false
 }).eq("id",p.id);

 await supabaseClient.from("player_state").upsert({
  user_id:p.id,
  paid:!!p.paid,
  alive:p.alive!==false,
  current_pick:p.pick||null,
  pick_locked:!!p.locked,
  result:p.result||"pending",
  wins:p.wins||0,
  out_round:p.outRound||null,
  out_pick:p.outPick||null
 });
}

async function dbSyncAll(){
 if(!onlineReady)return;
 await dbSaveSettings();
 for(const p of state.players){await dbUpsertPlayer(p);}
}

const localSave=save;
save=function(){
 localStorage.setItem(storeKey,JSON.stringify(state));
 dbSyncAll().catch(e=>console.error(e));
 render();
};

async function loginUser(){
 const name=document.getElementById("loginName").value.trim();
 const pin=document.getElementById("loginPin").value.trim();
 const remember=document.getElementById("rememberMe").checked;
 try{
  const {data,error}=await supabaseClient.rpc("app_login",{p_username:name,p_password:pin});
  if(error)throw error;
  if(!data||!data.length)return toast("Account not found.");
  const u=data[0];
  authUser={name:u.display_name,username:u.username,role:u.role,user_id:u.user_id,must_reset_password:!!u.must_reset_password};
  currentUserId=u.user_id;
  if(remember)localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  await dbLoad();
  if(u.role==="admin"){
   adminView="admin";
   localStorage.setItem("seah_admin_view_current",adminView);
   page="dashboard";
  }else{
   state.selectedPlayer=u.display_name;
   page="myPick";
  }
  render();
 }catch(e){
  console.error(e);
  toast("Login failed.");
 }
}

async function loginAdmin(){
 const u=prompt("Admin username:");
 if(u===null)return;
 const p=prompt("Admin password:");
 if(p===null)return;
 try{
  const {data,error}=await supabaseClient.rpc("app_login",{p_username:u,p_password:p});
  if(error)throw error;
  if(!data||!data.length||data[0].role!=="admin")return toast("Incorrect admin login.");
  authUser={name:data[0].display_name,username:data[0].username,role:"admin",user_id:data[0].user_id,must_reset_password:!!data[0].must_reset_password};
  currentUserId=data[0].user_id;
  localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  adminView="admin";
  localStorage.setItem("seah_admin_view_current",adminView);
  page="dashboard";
  await dbLoad();
  render();
 }catch(e){
  console.error(e);
  toast("Incorrect admin login.");
 }
}

async function createAccount(){
 const name=document.getElementById("createName").value.trim();
 const pin=document.getElementById("createPin").value.trim();
 const confirmPin=document.getElementById("createPinConfirm").value.trim();
 const code=document.getElementById("joinCode").value.trim();
 const remember=document.getElementById("createRemember").checked;
 if(!name||!pin)return toast("Enter a username and password.");
 if(pin!==confirmPin)return toast("Passwords do not match.");
 try{
  const {data,error}=await supabaseClient.rpc("app_register",{p_username:name,p_password:pin,p_join_code:code});
  if(error)throw error;
  if(!data||!data.length)return toast("Could not create account.");
  const u=data[0];
  authUser={name:u.display_name,username:u.username,role:"player",user_id:u.user_id,must_reset_password:false};
  currentUserId=u.user_id;
  if(remember)localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  await dbLoad();
  state.selectedPlayer=u.display_name;
  page="myPick";
  render();
 }catch(e){
  console.error(e);
  toast(e.message||"Could not create account.");
 }
}

async function boot(){
 const saved=localStorage.getItem("seah_auth_user_current");
 if(saved){
  try{authUser=JSON.parse(saved);currentUserId=authUser.user_id||null;}catch(e){}
 }
 render();
 await dbLoad();
}



if("serviceWorker" in navigator){
 window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js?v=5").catch(console.error));
}

boot();
