<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{
  --bg:#0f172a;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;

  --shadow:0 24px 60px rgba(0,0,0,.25);--radius:22px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 0%,rgba(249,115,22,.32),transparent 32%),radial-gradient(circle at 80% 8%,rgba(251,191,36,.22),transparent 28%),linear-gradient(135deg,#0f172a,#111827 55%,#020617);color:var(--ink);min-height:100vh}

.header{display:flex;align-items:center;gap:13px;color:white;margin-bottom:18px}

.logo-main{font-size:22px;font-weight:1000;letter-spacing:-1px}.logo-sub{font-size:13px;font-weight:1000;letter-spacing:-.7px;white-space:nowrap}
h1{font-size:28px;margin:0;letter-spacing:-.04em}.sub{font-size:14px;color:#fed7aa;margin:4px 0 0}
.shell{display:grid;grid-template-columns:250px 1fr;gap:18px}
.sidebar,.main,.login-wrap{background:rgba(255,255,255,.98);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

.sidebar.player-mode .profile{background:linear-gradient(135deg,var(--orange),var(--yellow));border:0;color:white;text-align:center}
.sidebar.player-mode .profile strong{font-size:30px;display:block;font-weight:1000;letter-spacing:-.04em}.sidebar.player-mode .profile .tiny{display:none}
.tiny{font-size:12px;color:var(--muted)}.muted{font-size:14px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:8px}.nav button{background:#1f2937;color:#dbe3f5;text-align:left}.nav button.active{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827}
button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer;background:var(--orange);color:white;transition:.15s ease}
button:hover{background:var(--orange2);transform:translateY(-1px)}button.secondary{background:#334155}button.yellow{background:var(--yellow);color:#111827}button.red{background:var(--red)}button.green{background:var(--green)}button.ghost{background:#fff7ed;color:#9a3412}button.small{padding:8px 10px;border-radius:11px;font-size:12px}button:disabled{opacity:.45;cursor:not-allowed;transform:none}
.mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.mode-switch button{background:#1f2937;color:#dbe3f5}.mode-switch button.active{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827}
.logout-btn{width:100%;margin-top:12px;background:#1f2937;color:#dbe3f5}
.topline{padding:18px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fafc)}
.title{font-size:21px;font-weight:1000;margin:0;letter-spacing:-.03em}.body{padding:20px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:#e2e8f0;color:#334155;white-space:nowrap}.badge.orange{background:#ffedd5;color:#9a3412}.badge.yellow{background:#fef3c7;color:#78350f}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.dark{background:#1f2937;color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{border:1px solid var(--line);border-radius:18px;background:#fff;padding:15px}.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:1000}.stat .value{font-size:28px;font-weight:1000;letter-spacing:-.05em}
.card{border:1px solid var(--line);border-radius:20px;background:white;overflow:hidden;margin-bottom:14px}.card-head{padding:14px 16px;background:#f8fafc;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.card-head strong{font-size:16px}.card-body{padding:16px}.list{display:flex;flex-direction:column;gap:10px}
.item,.admin-row,.compact-player{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px}.item-title,.admin-row-title{font-weight:950}.admin-row-detail,.compact-detail{font-size:12px;color:var(--muted);margin-top:2px}.actions{display:flex;flex-wrap:wrap;gap:8px}
.admin-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.admin-action-grid button{width:100%}
.round-row{display:grid;grid-template-columns:1fr;gap:10px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px}.round-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:11px 12px;font:inherit;background:white;color:var(--ink);outline:none}input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.16)}label{font-size:12px;font-weight:950;color:#334155;display:block;margin-bottom:6px}.formrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.notice{border:1px solid #fed7aa;background:#fff7ed;color:#9a3412;border-radius:18px;padding:14px;line-height:1.45}
.comp-header{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827;border-radius:22px;padding:18px;margin-bottom:16px}.comp-header h2{margin:0 0 6px;font-size:24px;letter-spacing:-.04em}.comp-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.compact-player{display:grid;grid-template-columns:1fr auto}.compact-name{font-weight:950}.compact-status{font-size:12px;font-weight:950;border-radius:999px;padding:5px 8px}.compact-status.ok{background:#dcfce7;color:#166534}.compact-status.wait{background:#fef3c7;color:#78350f}.compact-status.out{background:#fee2e2;color:#991b1b}
.install-button{width:100%;padding:15px;border-radius:18px;background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827;font-size:16px}.confirmed-btn{background:var(--green)!important;color:white!important;cursor:default!important}
.login-wrap{max-width:460px;margin:40px auto}.login-hero{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827;padding:24px;text-align:center}.big-logo{width:84px;height:84px;margin:0 auto 14px;border-radius:26px;background:rgba(255,255,255,.18);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white}.big-logo .logo-main{font-size:30px}.big-logo .logo-sub{font-size:17px}.login-body{padding:20px}.login-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}.login-tabs button{background:#f1f5f9;color:#334155}.login-tabs button.active{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#111827}.remember-row{display:flex;gap:10px;align-items:center;margin:12px 0;color:#334155;font-weight:800}.remember-row input{width:auto}
.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:13px 16px;border-radius:15px;box-shadow:0 20px 45px rgba(0,0,0,.35);opacity:0;transform:translateY(8px);transition:.2s;max-width:340px;z-index:60}.toast.show{opacity:1;transform:translateY(0)}

.compact-table{display:flex;flex-direction:column;gap:8px}
.compact-admin-row{display:grid;grid-template-columns:1.2fr 2fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}
.status-pills{display:flex;gap:6px;flex-wrap:wrap}
.compact-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.compact-round-row{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:10px;align-items:end;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}
.stats.five{grid-template-columns:repeat(5,1fr)}
.notification-editor{display:grid;grid-template-columns:1fr;gap:12px}

.player-list-row{display:grid;grid-template-columns:1.2fr auto auto auto auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}
.player-list-name{font-weight:950;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-edit-panel{grid-column:1/-1;display:none;background:#f8fafc;border-radius:12px;padding:10px;margin-top:6px}
.player-edit-panel.open{display:flex;gap:8px;flex-wrap:wrap}
.round-compact-row{display:grid;grid-template-columns:1.1fr 1fr .7fr;gap:8px;align-items:end;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}
.round-name{font-weight:950}
.round-sub{font-size:12px;color:var(--muted)}

.round-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}


.player-list-row.tight{grid-template-columns:minmax(90px,1.4fr) auto auto auto 42px}
.player-list-row.tight .small.edit-only{padding:6px 8px;font-size:11px;border-radius:9px;min-width:38px}
.player-list-row.tight .player-edit-panel{grid-column:1/-1}
.round-compact-row.clean{grid-template-columns:minmax(100px,1fr) minmax(110px,1fr) minmax(95px,.65fr)}

.player-list-name{
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.player-list-row.tight{
  grid-template-columns:minmax(0,1.6fr) auto auto auto 42px;
}
@media(max-width:520px){
 .player-list-row.tight{
   grid-template-columns:minmax(0,1fr) auto 42px;
 }
 .player-list-row.tight .badge:nth-of-type(2){
   display:none;
 }
 .player-list-row.tight .badge:nth-of-type(3){
   display:none;
 }
}

@media(max-width:700px){
 .player-list-row.tight{grid-template-columns:1fr auto auto auto 42px}
 .round-compact-row.clean{grid-template-columns:1fr 1fr}
 .round-compact-row.clean .round-person{grid-column:1/-1}
}

@media(max-width:700px){
 .player-list-row{grid-template-columns:1fr auto;gap:8px}
 .player-list-row .hide-mobile{display:none}
 .player-edit-panel.open{display:flex}

 .round-compact-row .round-person{grid-column:1/-1}
}

@media(max-width:900px){

}

@media(max-width:900px){.shell{grid-template-columns:1fr}.stats,.formrow,.round-controls{grid-template-columns:1fr}.header{align-items:flex-start}.admin-row{display:block}.admin-row .actions{margin-top:10px}}

 }

    if(typeof p.paid==="undefined"){p.paid=false;changed=true;}
    if(typeof p.alive==="undefined"){p.alive=true;changed=true;}
    if(typeof p.wins==="undefined"){p.wins=0;changed=true;}
    if(typeof p.pick==="undefined"){p.pick="";changed=true;}
    if(typeof p.locked==="undefined"){p.locked=false;changed=true;}
    if(typeof p.result==="undefined"){p.result="pending";changed=true;}
    if(!Array.isArray(p.previous)){p.previous=[];changed=true;}
    if(typeof p.notifications==="undefined"){p.notifications=u.notifications_enabled!==false;changed=true;}
   }
  });

  if(changed)localStorage.setItem(storeKey,JSON.stringify(state));
  return changed;
 }catch(e){
  console.warn("Could not sync users from Supabase",e);
  return false;
 }
}

function urlBase64ToUint8Array(base64String){
 const padding="=".repeat((4-base64String.length%4)%4);
 const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
 const rawData=window.atob(base64);
 const outputArray=new Uint8Array(rawData.length);
 for(let i=0;i<rawData.length;++i){outputArray[i]=rawData.charCodeAt(i);}
 return outputArray;
}

async function registerPushSubscription(){
 if(!("Notification" in window))throw new Error("Notifications are not supported on this device/browser.");
 if(!("serviceWorker" in navigator))throw new Error("Service workers are not supported on this device/browser.");
 if(!("PushManager" in window))throw new Error("Push notifications are not supported on this device/browser.");

 let permission=Notification.permission;
 if(permission==="default"){
  permission=await Notification.requestPermission();
 }
 if(permission!=="granted")throw new Error("Notification permission was not granted.");

 const registration=await navigator.serviceWorker.register("sw.js?v=27");
 await navigator.serviceWorker.ready;

 let subscription=await registration.pushManager.getSubscription();
 if(!subscription){
  subscription=await registration.pushManager.subscribe({
   userVisibleOnly:true,
   applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
  });
 }

 const p=currentPlayer();
 const userId=(authUser&&authUser.user_id)||p.id;
 if(!userId)throw new Error("Could not identify logged-in user.");

 const subJson=subscription.toJSON();
 const endpoint=subJson.endpoint;
 const deviceLabel=(navigator.userAgent||"Device").slice(0,180);

 const {error}=await supabaseClient
  .from("push_subscriptions")
  .upsert({
   user_id:userId,
   endpoint:endpoint,
   subscription:subJson,
   device_label:deviceLabel,
   updated_at:new Date().toISOString()
  },{onConflict:"endpoint"});

 if(error)throw error;
 return true;
}

async function unregisterPushSubscription(){
 try{
  if(!("serviceWorker" in navigator))return;
  const registration=await navigator.serviceWorker.getRegistration();
  if(!registration)return;
  const subscription=await registration.pushManager.getSubscription();
  if(subscription){
   const endpoint=subscription.endpoint;
   await subscription.unsubscribe();
   await supabaseClient.from("push_subscriptions").delete().eq("endpoint",endpoint);
  }
 }catch(e){
  console.warn("Could not remove push subscription",e);
 }
}


async function togglePlayerNotifications(){
 const p=currentPlayer();
 if(!p)return toast("Player not found.");

 const username=(authUser&&authUser.username)?authUser.username:(p.username||p.name);
 if(!username)return toast("Could not identify account username.");

 const next=!(p.notifications===true);

 try{
  if(next){
   toast("Requesting notification permission...");
   await registerPushSubscription();
  }else{
   await unregisterPushSubscription();
  }

  const rpcRes=await supabaseClient.rpc("app_set_notifications_by_username",{
   p_username:username,
   p_enabled:next
  });
  if(rpcRes.error)throw rpcRes.error;

  const checkRes=await supabaseClient
   .from("app_users")
   .select("notifications_enabled")
   .ilike("username",username)
   .maybeSingle();

  if(checkRes.error)throw checkRes.error;

  const savedValue=checkRes.data?checkRes.data.notifications_enabled:next;
  p.notifications=!!savedValue;
  if(authUser){
   authUser.notifications_enabled=p.notifications;
   localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  }

  toast(p.notifications?"Notifications enabled on this device.":"Notifications turned off.");
  localStorage.setItem(storeKey,JSON.stringify(state));
  render();
 }catch(e){
  console.error("Notification toggle failed",e);
  toast("Could not enable notifications: "+(e.message||"unknown error"));
  await dbLoad();
  render();
 }
}

function processRound(){
 const pending=alive().filter(p=>p.result==="pending");
 if(pending.length){
  toast("Mark result for: "+pending.map(p=>p.name).join(", "));
  return;
 }

 const teamResults={};
 const conflicts=[];

 alive().forEach(p=>{
  if(!p.pick)return;
  if(!teamResults[p.pick]){
   teamResults[p.pick]=p.result;
  }else if(teamResults[p.pick]!==p.result){
   conflicts.push(p.pick);
  }
 });

 if(conflicts.length){
  toast("Result mismatch for: "+[...new Set(conflicts)].join(", "));
  return;
 }

 const before=alive().length;

 alive().forEach(p=>{
  if(p.pick&&!p.previous.includes(p.pick))p.previous.push(p.pick);

  if(!p.pick||p.result==="lose"){
   p.alive=false;
   p.outRound=state.round;
   p.outPick=p.pick||"No Pick";
  }

  p.pick="";
  p.locked=false;
  p.result="pending";
 });

 const s=alive();

 if(s.length===1){
  s[0].wins++;
  state.champions.push({name:s[0].name,comp:state.competition,rollover:state.rollover||0});
  addActivity("round","Winner found: "+s[0].name,"Competition #"+state.competition);
  addAdminAlert("Winner found","Winner: "+s[0].name+". Admin action needed: send winner notification, sort prize money, then start the next competition when ready.");
  alert("Winner found: "+s[0].name+"\n\nAdmin action needed: sort prize money, then start the next competition when ready.");
  toast("Winner: "+s[0].name);
  page="playerHall";
 }else if(s.length===0&&before>0){
  state.potCarryover=(state.potCarryover||0)+(paid().length*state.entryFee);
  state.rollover=(state.rollover||0)+1;
  state.round++;
  state.players.filter(p=>p.approved).forEach(p=>{
   p.alive=true;
   p.paid=false;
   p.outRound=null;
   p.outPick=null;
   p.pick="";
   p.locked=false;
   p.result="pending";
  });
  addActivity("round","Rollover "+state.rollover+" started","Everyone is back in and payment is due again");
  addAdminAlert("Rollover started","Rollover "+state.rollover+" has started. Admin action needed: send rollover notification and collect payment again from everyone who is back in.");
  alert("Rollover started.\n\nAdmin action needed: collect payment again from everyone who is back in.");
  toast("Rollover "+state.rollover+" started. Everyone is back in and payment is due again.");
 }else{
  state.round++;
  addActivity("round","Round processed","Moved to Round "+state.round);
  toast("Round processed.");
 }

 save();
}

 if(!newName)return toast("Display name is required.");
 if(!isAdminPlayer&&!newPin)return toast("Password is required.");
 if(state.players.some(x=>x!==p&&x.name.toLowerCase()===newName.toLowerCase()))return toast("That display name already exists.");
 try{
  if(!isAdminPlayer&&newPin){
   const {error}=await supabaseClient.rpc("app_change_password",{p_user_id:p.id,p_new_password:newPin});
   if(error)throw error;
  }
  p.name=newName;
  if(!isAdminPlayer)p.pin="";
  state.selectedPlayer=newName;
  if(authUser&&authUser.role==="player"&&authUser.name===oldName){
   authUser.name=newName;
   localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  }
  if(authUser&&authUser.role==="admin"&&authUser.name===oldName){
   authUser.name=newName;
   localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  }
  toast(isAdminPlayer?"Display name updated. Admin password unchanged.":"Account updated.");
  save();
 }catch(e){
  console.error(e);
  toast("Could not update account: "+(e.message||"unknown error"));
 }
}

async function sendPushToUsername(username,title,message){
 const res=await fetch(PUSH_FUNCTION_URL,{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+SUPABASE_PUBLISHABLE_KEY
  },
  body:JSON.stringify({username,title,message})
 });
 const data=await res.json().catch(()=>({}));
 if(!res.ok||data.success===false)throw new Error(data.error||"Push send failed");
 return data;
}

async function sendPushToPlayers(players,title,message){
 const targets=[...new Set(players.map(p=>p.username||p.name).filter(Boolean))];
 if(!targets.length)return {sent:0,failed:0,total:0};
 let sent=0,failed=0,total=0;
 for(const username of targets){
  try{
   const r=await sendPushToUsername(username,title,message);
   sent+=(r.sent||0);
   failed+=(r.failed||0);
   total+=(r.total||0);
  }catch(e){
   console.error("Push failed for",username,e);
   failed++;
  }
 }
 return {sent,failed,total};
}

async function dbLoad(){
 try{
  const [settingsRes, compsRes, usersRes, stateRes, historyRes, teamsRes, champsRes]=await Promise.all([
   supabaseClient.from("app_settings").select("*").eq("id",1).maybeSingle(),
   supabaseClient.from("competitions").select("*").eq("status","active").order("created_at",{ascending:false}).limit(1).maybeSingle(),
   supabaseClient.from("app_users").select("*").order("created_at",{ascending:true}),
   supabaseClient.from("player_state").select("*"),
   supabaseClient.from("pick_history").select("*"),
   supabaseClient.from("teams").select("*").order("league").order("team_name"),
   supabaseClient.from("champions").select("*, app_users(display_name)").order("won_at",{ascending:true})
  ]);

  const results=[settingsRes, compsRes, usersRes, stateRes, historyRes, teamsRes, champsRes];
  const firstError=results.find(r=>r.error);
  if(firstError)throw firstError.error;

  const s=settingsRes.data;
  if(s){
   state.joinCode=s.join_code||state.joinCode;
   state.entryFee=Number(s.entry_fee||state.entryFee);
   state.deadline=s.deadline||state.deadline;
   state.rules=s.rules||state.rules;
  }

  const c=compsRes.data;
  if(c){
   state.activeCompetitionId=c.id;
   state.competition=c.competition_number||1;
   state.rollover=c.rollover_number||0;
   state.round=c.round_number||1;
   state.potCarryover=Number(c.pot_carryover||0);
  }

  const stateByUser={};
  (stateRes.data||[]).forEach(p=>stateByUser[p.user_id]=p);

  const histByUser={};
  (historyRes.data||[]).forEach(h=>{
   if(!histByUser[h.user_id])histByUser[h.user_id]=[];
   histByUser[h.user_id].push(h.team);
  });

  if(authUser&&authUser.user_id){
   const me=(usersRes.data||[]).find(u=>u.id===authUser.user_id);
   if(me){
    authUser.name=me.display_name||me.username;
    authUser.must_reset_password=!!me.must_reset_password;
    authUser.notifications_enabled=me.notifications_enabled===false?false:true;
    localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
   }
  }

  state.players=(usersRes.data||[]).map(u=>{
   const ps=stateByUser[u.id]||{};
   return {
    id:u.id,
    username:u.username,
    name:u.display_name||u.username,
    pin:"",
    approved:!!u.approved,
    paid:!!ps.paid,
    alive:ps.alive!==false,
    wins:ps.wins||0,
    pick:ps.current_pick||"",
    locked:!!ps.pick_locked,
    result:ps.result||"pending",
    previous:histByUser[u.id]||[],
    outRound:ps.out_round,
    outPick:ps.out_pick,
    notifications:u.notifications_enabled === false ? false : true,
    adminPlayer:u.role==="admin"
   };
  });

  const leagues={"Premier League":[],"Championship":[],"League One":[],"League Two":[]};
  (teamsRes.data||[]).forEach(t=>{
   if(!leagues[t.league])leagues[t.league]=[];
   leagues[t.league].push(t.team_name);
  });
  state.leagues=leagues;
  state.teams=Object.values(leagues).flat();

  state.champions=(champsRes.data||[]).map(c=>({
   name:c.app_users?.display_name||"Winner",
   comp:c.competition_number,
   rollover:c.rollover_number
  }));

  if(authUser&&authUser.username){
   const me=state.players.find(p=>(p.username||"").toLowerCase()===authUser.username.toLowerCase());
   if(me){
    state.selectedPlayer=me.name;
    authUser.name=me.name;
    authUser.notifications_enabled=me.notifications;
    localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
   }
  }

  onlineReady=true;
  localStorage.setItem(storeKey,JSON.stringify(state));
  setOnlineStatus("Connected to database",true);
  render();
 }catch(e){
  console.error(e);
  onlineReady=false;
  setOnlineStatus("Database connection failed",false);
  toast("Database connection failed. Check Supabase setup.");
 }
}

async function dbSaveSettings(){
 if(!onlineReady)return;
 await supabaseClient.from("app_settings").update({
  join_code:state.joinCode,
  entry_fee:state.entryFee,
  deadline:state.deadline,
  rules:state.rules
 }).eq("id",1);

 if(state.activeCompetitionId){
  await supabaseClient.from("competitions").update({
   competition_number:state.competition,
   rollover_number:state.rollover||0,
   round_number:state.round,
   pot_carryover:state.potCarryover||0
  }).eq("id",state.activeCompetitionId);
 }
}

async function dbUpsertPlayer(p){
 if(!onlineReady||!p.id)return;
 await supabaseClient.from("app_users").update({
  display_name:p.name,
  approved:!!p.approved,
  notifications_enabled:!!p.notifications
 }).eq("id",p.id);

 await supabaseClient.from("player_state").upsert({
  user_id:p.id,
  paid:!!p.paid,
  alive:p.alive!==false,
  current_pick:p.pick||null,
  pick_locked:!!p.locked,
  result:p.result||"pending",
  wins:p.wins||0,
  out_round:p.outRound||null,
  out_pick:p.outPick||null
 });
}

async function dbSyncAll(){
 if(!onlineReady)return;
 await dbSaveSettings();
 for(const p of state.players){await dbUpsertPlayer(p);}
}

const localSave=save;
save=function(){
 localStorage.setItem(storeKey,JSON.stringify(state));
 dbSyncAll().catch(e=>console.error(e));
 render();
};

async function loginUser(){
 const name=document.getElementById("loginName").value.trim();
 const pin=document.getElementById("loginPin").value.trim();
 const remember=document.getElementById("rememberMe").checked;
 try{
  const {data,error}=await supabaseClient.rpc("app_login",{p_username:name,p_password:pin});
  if(error)throw error;
  if(!data||!data.length)return toast("Account not found.");
  const u=data[0];
  authUser={name:u.display_name,username:u.username,role:u.role,user_id:u.user_id,must_reset_password:!!u.must_reset_password,notifications_enabled:u.notifications_enabled===false?false:true};
  currentUserId=u.user_id;
  if(remember)localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  await dbLoad();
  const loggedInPlayer=state.players.find(p=>p.id===u.user_id);
  if(loggedInPlayer)loggedInPlayer.notifications=u.notifications_enabled===false?false:true;
  if(u.role==="admin"){
   adminView="admin";
   localStorage.setItem("seah_admin_view_current",adminView);
   page="dashboard";
  }else{
   state.selectedPlayer=u.display_name;
   page="myPick";
  }
  render();
 }catch(e){
  console.error(e);
  toast("Login failed.");
 }
}

async function loginAdmin(){
 const u=prompt("Admin username:");
 if(u===null)return;
 const p=prompt("Admin password:");
 if(p===null)return;
 try{
  const {data,error}=await supabaseClient.rpc("app_login",{p_username:u,p_password:p});
  if(error)throw error;
  if(!data||!data.length||data[0].role!=="admin")return toast("Incorrect admin login.");
  authUser={name:data[0].display_name,username:data[0].username,role:"admin",user_id:data[0].user_id,must_reset_password:!!data[0].must_reset_password,notifications_enabled:data[0].notifications_enabled===false?false:true};
  currentUserId=data[0].user_id;
  localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  adminView="admin";
  localStorage.setItem("seah_admin_view_current",adminView);
  page="dashboard";
  await dbLoad();
  const loggedInAdmin=state.players.find(p=>p.id===data[0].user_id);
  if(loggedInAdmin)loggedInAdmin.notifications=data[0].notifications_enabled===false?false:true;
  render();
 }catch(e){
  console.error(e);
  toast("Incorrect admin login.");
 }
}

async function createAccount(){
 const name=document.getElementById("createName").value.trim();
 const pin=document.getElementById("createPin").value.trim();
 const confirmPin=document.getElementById("createPinConfirm").value.trim();
 const code=document.getElementById("joinCode").value.trim();
 const remember=document.getElementById("createRemember").checked;
 if(!name||!pin)return toast("Enter a username and password.");
 if(pin!==confirmPin)return toast("Passwords do not match.");
 try{
  const {data,error}=await supabaseClient.rpc("app_register",{p_username:name,p_password:pin,p_join_code:code});
  if(error)throw error;
  if(!data||!data.length)return toast("Could not create account.");
  const u=data[0];
  authUser={name:u.display_name,username:u.username,role:"player",user_id:u.user_id,must_reset_password:false};
  currentUserId=u.user_id;
  if(remember)localStorage.setItem("seah_auth_user_current",JSON.stringify(authUser));
  await dbLoad();
  state.selectedPlayer=u.display_name;
  page="myPick";
  render();
 }catch(e){
  console.error(e);
  toast(e.message||"Could not create account.");
 }
}

async function boot(){
 const saved=localStorage.getItem("seah_auth_user_current");
 if(saved){
  try{authUser=JSON.parse(saved);currentUserId=authUser.user_id||null;}catch(e){}
 }
 render();
 await dbLoad();
}



if("serviceWorker" in navigator){
 window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js?v=27").catch(console.error));
}

boot();
